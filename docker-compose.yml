services:
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "9999:9999"
    environment:
      npm_config_registry: https://registry.npmmirror.com
    command: sh -c "npm install && npm run start"

volumes:
  frontend_node_modules:
